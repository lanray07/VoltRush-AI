name: iOS Review Recording

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ios-review-recording.yml
      - VoltRushAI/App/VoltRushAIApp.swift
      - VoltRushAI/App/AppShellView.swift
      - VoltRushAI/Views/Shop/PremiumShopView.swift

jobs:
  recording:
    name: Record EULA Flow
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build, launch, and record simulator
        shell: bash
        run: |
          set -euo pipefail

          xcrun simctl list runtimes -j > "$RUNNER_TEMP/runtimes.json"
          xcrun simctl list devicetypes -j > "$RUNNER_TEMP/devicetypes.json"

          RUNTIME="$(python3 - <<'PY'
          import json, os
          with open(os.environ["RUNNER_TEMP"] + "/runtimes.json", "r", encoding="utf-8") as handle:
              data = json.load(handle)
          runtimes = [
              runtime for runtime in data["runtimes"]
              if runtime.get("isAvailable")
              and (
                  runtime.get("platform") == "iOS"
                  or "iOS" in runtime.get("name", "")
                  or runtime.get("platformIdentifier", "").endswith("iphonesimulator")
              )
          ]
          if not runtimes:
              raise SystemExit("No available iOS simulator runtime found")
          print(runtimes[-1]["identifier"])
          PY
          )"

          DEVICE_TYPE="$(python3 - <<'PY'
          import json, os
          with open(os.environ["RUNNER_TEMP"] + "/devicetypes.json", "r", encoding="utf-8") as handle:
              data = json.load(handle)
          device_types = [item for item in data["devicetypes"] if "iPad" in item.get("name", "")]
          preferred = [
              "iPad Air 11-inch (M3)",
              "iPad Pro 11-inch (M4)",
              "iPad Air (5th generation)",
              "iPad Pro (11-inch)",
              "iPad",
          ]
          for name in preferred:
              for item in device_types:
                  if item.get("name") == name:
                      print(item["identifier"])
                      raise SystemExit(0)
          if not device_types:
              raise SystemExit("No iPad simulator device type found")
          print(device_types[-1]["identifier"])
          PY
          )"

          UDID="$(xcrun simctl create "VoltRush Review iPad" "$DEVICE_TYPE" "$RUNTIME")"
          trap 'xcrun simctl shutdown "$UDID" >/dev/null 2>&1 || true; xcrun simctl delete "$UDID" >/dev/null 2>&1 || true' EXIT

          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b

          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          xcodebuild \
            -project VoltRushAI.xcodeproj \
            -scheme VoltRushAI \
            -configuration Debug \
            -destination "id=$UDID" \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            build

          APP_PATH="$(find "$DERIVED_DATA/Build/Products/Debug-iphonesimulator" -name "VoltRushAI.app" -maxdepth 2 -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::VoltRushAI.app was not found."
            exit 1
          fi

          xcrun simctl install "$UDID" "$APP_PATH"

          mkdir -p "$PWD/ReviewRecording"
          VIDEO_PATH="$PWD/ReviewRecording/voltrush-eula-review-demo.mp4"

          xcrun simctl io "$UDID" recordVideo --codec=h264 --force "$VIDEO_PATH" &
          REC_PID="$!"

          sleep 2
          xcrun simctl launch "$UDID" com.voltrushai.app --review-paywall-demo
          sleep 24

          kill -INT "$REC_PID" >/dev/null 2>&1 || true
          wait "$REC_PID" || true

          if [ ! -s "$VIDEO_PATH" ]; then
            echo "::error::Review recording was not created."
            exit 1
          fi

          ls -lh "$VIDEO_PATH"

      - name: Upload review recording
        uses: actions/upload-artifact@v4
        with:
          name: VoltRush-EULA-Review-Recording
          path: ReviewRecording/voltrush-eula-review-demo.mp4
          if-no-files-found: error
