name: iOS Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build VoltRushAI
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app
        run: |
          xcodebuild \
            -project VoltRushAI.xcodeproj \
            -scheme VoltRushAI \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
